name: CI Pipeline

on:
  push:
    branches:
      - "**"

permissions:
  contents: read

jobs:
  linter:
    name: Linter (gatekeeper)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linter
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run linter
        run: |
          ruff check .

  train:
    name: Train (GPU / expensive)
    needs: linter
    if: >-
      ${{
        needs.linter.result == 'success' &&
        github.ref == 'refs/heads/main' &&
        contains(github.event.head_commit.message || '', '[run-train]')
      }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Training
        run: |
          set -o pipefail
          echo "Starting training…"
          python -u train.py 2>&1 | tee train_output.log

      - name: Write error log (only on failure)
        if: failure()
        run: |
          {
            echo "Training job failed."
            echo "Repo: ${{ github.repository }}"
            echo "Run:  ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "SHA:  ${{ github.sha }}"
            echo ""
            echo "--- Last 200 lines of train_output.log (if present) ---"
            if [ -f train_output.log ]; then
              tail -n 200 train_output.log
            else
              echo "train_output.log not found."
            fi
          } > error_logs.txt

      - name: Upload error log artifact (only on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: training-error-logs
          path: error_logs.txt
          if-no-files-found: error

      - name: Cleanup (always)
        if: always()
        run: |
          echo "Cleaning up temporary cloud volumes..."
          